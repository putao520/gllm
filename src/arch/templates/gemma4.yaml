name: gemma4
version: "1.0"
family: decoder
extra_aliases:
  - gemma4forconditionalgeneration   # HuggingFace 多模态 token

config:
  num_layers: "${num_hidden_layers}"
  hidden_size: "${hidden_size}"
  num_heads: "${num_attention_heads}"
  num_kv_heads: "${num_key_value_heads}"
  head_dim: "${head_dim}"
  intermediate_size: "${intermediate_size}"
  vocab_size: "${vocab_size}"
  rope_theta: "${rope_theta}"
  global_rope_theta: "${global_rope_theta}"
  sliding_window: "${sliding_window}"
  dtype: "${dtype}"

tensor_patterns:
  embedding: "model.embed_tokens.weight"
  lm_head: "model.embed_tokens.weight"
  layer_prefix: "model.layers.{}"
  q_proj: "self_attn.q_proj.weight"
  k_proj: "self_attn.k_proj.weight"
  v_proj: "self_attn.v_proj.weight"
  o_proj: "self_attn.o_proj.weight"
  gate_proj: "mlp.gate_proj.weight"
  up_proj: "mlp.up_proj.weight"
  down_proj: "mlp.down_proj.weight"
  input_layernorm: "input_layernorm.weight"
  post_attention_layernorm: "post_attention_layernorm.weight"
  final_norm: "model.norm.weight"

graph:
  inputs:
    - name: input_ids
      dtype: int64
      shape: [batch, seq_len]

  outputs:
    - name: logits
      dtype: "${dtype}"
      shape: [batch, seq_len, "${vocab_size}"]

  nodes:
    - name: embed
      op_type: Gather
      inputs: [model.embed_tokens.weight, input_ids]
      outputs: [hidden_0]

    # T33 (PLE 5-input signature 根治): main_embed 是 "token embedding 原始输出"
    # 的别名,跨 transformer 层保持不变(hidden_0 会被每层重写)。通过
    # 在 repeat 块外用额外 Gather 节点单独产出,保证后续所有层读到的都是
    # 未被修改的初始 embedding。only_if 守卫避免无 PLE 的变体白付计算。
    - name: embed_main
      op_type: Gather
      only_if: has_per_layer_embedding
      inputs: [model.embed_tokens.weight, input_ids]
      outputs: [main_embed]

    # T33: ple_full [seq, num_layers * dim_per_layer] 是所有层共享的 PLE
    # lookup 结果,每个 transformer 层在 repeat 展开时切出自己那段列区段。
    - name: ple_embed_full
      op_type: Gather
      only_if: has_per_layer_embedding
      inputs: [model.per_layer_embedding.embed_tokens.weight, input_ids]
      outputs: [ple_full]

    - repeat: "${num_hidden_layers}"
      var: i
      nodes:
        # ── Pre-Attention RMSNorm ──
        - name: "layer_${i}_input_norm"
          op_type: SimplifiedLayerNormalization
          inputs: ["hidden_0", "model.layers.${i}.input_layernorm.weight"]
          outputs: ["layer_${i}_normed"]

        # ── Q/K/V Projections ──
        # SharedKvRef 层跳过 K/V 投影，复用前一个非共享层的 KV
        - name: "layer_${i}_q_proj"
          op_type: MatMul
          inputs: ["layer_${i}_normed", "model.layers.${i}.self_attn.q_proj.weight"]
          outputs: ["layer_${i}_q"]

        - name: "layer_${i}_k_proj"
          op_type: MatMul
          inputs: ["layer_${i}_normed", "model.layers.${i}.self_attn.k_proj.weight"]
          outputs: ["layer_${i}_k"]
          attributes:
            kv_shareable: 1

        - name: "layer_${i}_v_proj"
          op_type: MatMul
          inputs: ["layer_${i}_normed", "model.layers.${i}.self_attn.v_proj.weight"]
          outputs: ["layer_${i}_v"]
          attributes:
            kv_shareable: 1

        # ── QK-Norm (替代 softcap) ──
        - name: "layer_${i}_qk_norm"
          op_type: QkNorm
          inputs: ["layer_${i}_q", "layer_${i}_k"]
          outputs: ["layer_${i}_q_normed", "layer_${i}_k_normed"]

        # ── Value Norm (无学习参数的 RMSNorm) ──
        - name: "layer_${i}_v_norm"
          op_type: ValueNorm
          inputs: ["layer_${i}_v"]
          outputs: ["layer_${i}_v_normed"]

        # ── Dual RoPE: sliding θ=10K / global θ=1M+partial=0.25 ──
        - name: "layer_${i}_rope"
          op_type: DualRotaryEmbedding
          inputs: ["layer_${i}_q_normed", "layer_${i}_k_normed"]
          outputs: ["layer_${i}_q_rope", "layer_${i}_k_rope"]
          attributes:
            sliding_theta: "${rope_theta}"
            global_theta: "${global_rope_theta}"
            global_partial: 0.25

        # ── Attention (per-layer: sliding-window 或 global) ──
        - name: "layer_${i}_attn"
          op_type: Attention
          inputs: ["layer_${i}_q_rope", "layer_${i}_k_rope", "layer_${i}_v_normed"]
          outputs: ["layer_${i}_attn_out"]
          attributes:
            num_heads: "${num_attention_heads}"
            num_kv_heads: "${num_key_value_heads}"
            head_dim: "${head_dim}"
            causal: 1
            sliding_window: "${sliding_window}"
            per_layer_type: 1

        - name: "layer_${i}_o_proj"
          op_type: MatMul
          inputs: ["layer_${i}_attn_out", "model.layers.${i}.self_attn.o_proj.weight"]
          outputs: ["layer_${i}_attn_proj"]

        # ── Post-Attention Residual ──
        - name: "layer_${i}_residual_add"
          op_type: Add
          inputs: ["hidden_0", "layer_${i}_attn_proj"]
          outputs: ["layer_${i}_residual"]

        # ── Pre-FFN RMSNorm ──
        - name: "layer_${i}_post_norm"
          op_type: SimplifiedLayerNormalization
          inputs: ["layer_${i}_residual", "model.layers.${i}.post_attention_layernorm.weight"]
          outputs: ["layer_${i}_post_normed"]

        # ── FFN: Standard GELU (非 gated，非 GeGLU) ──
        - name: "layer_${i}_up_proj"
          op_type: MatMul
          inputs: ["layer_${i}_post_normed", "model.layers.${i}.mlp.up_proj.weight"]
          outputs: ["layer_${i}_up"]

        - name: "layer_${i}_gelu"
          op_type: GELU
          inputs: ["layer_${i}_up"]
          outputs: ["layer_${i}_act"]

        - name: "layer_${i}_down_proj"
          op_type: MatMul
          inputs: ["layer_${i}_act", "model.layers.${i}.mlp.down_proj.weight"]
          outputs: ["layer_${i}_mlp_out"]

        # ── Post-FFN Residual ──
        - name: "layer_${i}_output_add"
          op_type: Add
          inputs: ["layer_${i}_residual", "layer_${i}_mlp_out"]
          outputs: ["hidden_0"]

        # ── PerLayerEmbedding (仅 E2B / E4B 启用, 31B Dense / 26B MoE 跳过) ──
        # T33 (5-input signature 根治): PerLayerEmbed JIT op 需要 5 inputs
        # [hidden_0, main_embed, ple_slice, proj_w, post_mlp_w], 其中:
        #   - main_embed: 初始 token embedding (graph 级别一次性产出, 见顶部 embed_main 节点)
        #   - ple_slice:  当前层的 PLE token, 由模板 `expand_per_layer_embed` 从
        #                 ple_full 切出 (列区段 [layer_idx*dim, (layer_idx+1)*dim))
        #   - proj_w / post_mlp_w: 每层独立的投影权重
        #
        # YAML 此节点保持"逻辑 4 输入"(省略 main_embed, ple_slice 用 ple_full
        # 引用), 由 `expand_per_layer_embed` 在模板展开时:
        #   1) 插入 `layer_${i}_ple_slice = PleSlice(ple_full, layer_idx, dim_per_layer)` 节点
        #   2) 改写本节点输入为 [hidden_0, main_embed, layer_${i}_ple_slice, proj_w, post_mlp_w]
        #
        # only_if 表达式来自 ResolvedConfig::has_per_layer_embedding (由
        # hidden_size_per_layer_input > 0 推导)。E2B/E4B 此值 > 0, 31B/26B 为 0。
        - name: "layer_${i}_ple"
          op_type: PerLayerEmbed
          only_if: has_per_layer_embedding
          inputs:
            - "hidden_0"
            - "ple_full"
            - "model.per_layer_embedding.per_layer_projection.weight"
            - "model.layers.${i}.post_mlp_projection.weight"
          outputs: ["hidden_0"]
          attributes:
            layer_idx: "${i}"
            dim_per_layer: "${hidden_size_per_layer_input}"
            num_layers: "${num_hidden_layers}"
            hidden: "${hidden_size}"

    - name: final_norm
      op_type: SimplifiedLayerNormalization
      inputs: ["hidden_0", "model.norm.weight"]
      outputs: [hidden_final]

    - name: lm_head
      op_type: MatMul
      inputs: [hidden_final, model.embed_tokens.weight]
      outputs: [logits]

fusion_hints:
  - pattern: [q_proj, k_proj, v_proj, qk_norm, v_norm, rope]
    target: FusedQkvNormRope
  - pattern: [up_proj, gelu, down_proj]
    target: FusedLinearGELU
  - pattern: [matmul, scale, softmax, matmul]
    target: FlashAttention
