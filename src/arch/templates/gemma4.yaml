name: gemma4
version: "1.0"
family: decoder
extra_aliases:
  - gemma4forconditionalgeneration   # HuggingFace multi-modal token

config:
  num_layers: "${num_hidden_layers}"
  hidden_size: "${hidden_size}"
  num_heads: "${num_attention_heads}"
  num_kv_heads: "${num_key_value_heads}"
  head_dim: "${head_dim}"
  intermediate_size: "${intermediate_size}"
  vocab_size: "${vocab_size}"
  rope_theta: "${rope_theta}"
  global_rope_theta: "${global_rope_theta}"
  sliding_window: "${sliding_window}"
  dtype: "${dtype}"

tensor_patterns:
  embedding: "model.embed_tokens.weight"
  lm_head: "model.embed_tokens.weight"
  layer_prefix: "model.layers.{}"
  q_proj: "self_attn.q_proj.weight"
  k_proj: "self_attn.k_proj.weight"
  v_proj: "self_attn.v_proj.weight"
  o_proj: "self_attn.o_proj.weight"
  q_norm: "self_attn.q_norm.weight"
  k_norm: "self_attn.k_norm.weight"
  gate_proj: "mlp.gate_proj.weight"
  up_proj: "mlp.up_proj.weight"
  down_proj: "mlp.down_proj.weight"
  input_layernorm: "input_layernorm.weight"
  post_attention_layernorm: "post_attention_layernorm.weight"
  pre_feedforward_layernorm: "pre_feedforward_layernorm.weight"
  post_feedforward_layernorm: "post_feedforward_layernorm.weight"
  layer_scalar: "layer_scalar"
  final_norm: "model.norm.weight"

graph:
  inputs:
    - name: input_ids
      dtype: int64
      shape: [batch, seq_len]

  outputs:
    - name: logits
      dtype: "${dtype}"
      shape: [batch, seq_len, "${vocab_size}"]

  nodes:
    - name: embed
      op_type: Gather
      inputs: [model.embed_tokens.weight, input_ids]
      outputs: [hidden_0]

    # ── PerLayerEmbedding (PLE) ──
    # PLE nodes are disabled in the YAML template because the PLE JIT
    # implementation is not yet complete (weight name mapping, expand
    # function, JIT lower). Enabling them causes SIGSEGV due to NULL
    # weight pointers. Re-enable when PLE JIT is fully implemented.
    #
    # - name: embed_main
    #   op_type: Gather
    #   only_if: has_per_layer_embedding
    #   inputs: [model.embed_tokens.weight, input_ids]
    #   outputs: [main_embed]
    #
    # - name: ple_embed_full
    #   op_type: Gather
    #   only_if: has_per_layer_embedding
    #   inputs: [model.per_layer_embedding.embed_tokens.weight, input_ids]
    #   outputs: [ple_full]

    - repeat: "${num_hidden_layers}"
      var: i
      nodes:
        # ── Pre-Attention RMSNorm ──
        - name: "layer_${i}_input_norm"
          op_type: SimplifiedLayerNormalization
          inputs: ["hidden_0", "model.layers.${i}.input_layernorm.weight"]
          outputs: ["layer_${i}_normed"]

        # ── Q/K/V Projections ──
        - name: "layer_${i}_q_proj"
          op_type: MatMul
          inputs: ["layer_${i}_normed", "model.layers.${i}.self_attn.q_proj.weight"]
          outputs: ["layer_${i}_q"]

        - name: "layer_${i}_k_proj"
          op_type: MatMul
          only_if: "!is_kv_shared_layer_${i}"
          inputs: ["layer_${i}_normed", "model.layers.${i}.self_attn.k_proj.weight"]
          outputs: ["layer_${i}_k"]
          attributes:
            kv_shareable: 1

        - name: "layer_${i}_v_proj"
          op_type: MatMul
          only_if: "!is_kv_shared_layer_${i}"
          inputs: ["layer_${i}_normed", "model.layers.${i}.self_attn.v_proj.weight"]
          outputs: ["layer_${i}_v"]
          attributes:
            kv_shareable: 1

        # ── QK-Norm (L2 normalize + sqrt(head_dim) scale) ──
        - name: "layer_${i}_qk_norm"
          op_type: QkNorm
          inputs: ["layer_${i}_q", "layer_${i}_k"]
          outputs: ["layer_${i}_q_normed", "layer_${i}_k_normed"]

        # ── Value Norm (weightless RMSNorm) ──
        - name: "layer_${i}_v_norm"
          op_type: ValueNorm
          only_if: "!is_kv_shared_layer_${i}"
          inputs: ["layer_${i}_v"]
          outputs: ["layer_${i}_v_normed"]

        # ── Dual RoPE: sliding theta=10K / global theta=1M+partial=0.25 ──
        - name: "layer_${i}_rope"
          op_type: DualRotaryEmbedding
          inputs: ["layer_${i}_q_normed", "layer_${i}_k_normed"]
          outputs: ["layer_${i}_q_rope", "layer_${i}_k_rope"]
          attributes:
            sliding_theta: "${rope_theta}"
            global_theta: "${global_rope_theta}"
            global_partial: 0.25

        # ── Attention (per-layer: sliding-window or global) ──
        - name: "layer_${i}_attn"
          op_type: Attention
          inputs: ["layer_${i}_q_rope", "layer_${donor_i}_k_rope", "layer_${donor_i}_v_normed"]
          outputs: ["layer_${i}_attn_out"]
          attributes:
            num_heads: "${num_attention_heads}"
            num_kv_heads: "${num_key_value_heads}"
            head_dim: "${head_dim}"
            causal: 1
            sliding_window: "${sliding_window}"
            per_layer_type: 1

        - name: "layer_${i}_o_proj"
          op_type: MatMul
          inputs: ["layer_${i}_attn_out", "model.layers.${i}.self_attn.o_proj.weight"]
          outputs: ["layer_${i}_attn_proj"]

        # ── Post-Attention Residual ──
        - name: "layer_${i}_residual_add"
          op_type: Add
          inputs: ["hidden_0", "layer_${i}_attn_proj"]
          outputs: ["layer_${i}_residual"]

        # ── Post-Attention RMSNorm ──
        - name: "layer_${i}_post_attn_norm"
          op_type: SimplifiedLayerNormalization
          inputs: ["layer_${i}_residual", "model.layers.${i}.post_attention_layernorm.weight"]
          outputs: ["layer_${i}_post_attn_normed"]

        # ── Pre-FFN RMSNorm (Gemma 4 specific, separate from post_attention norm) ──
        - name: "layer_${i}_pre_ffn_norm"
          op_type: SimplifiedLayerNormalization
          inputs: ["layer_${i}_post_attn_normed", "model.layers.${i}.pre_feedforward_layernorm.weight"]
          outputs: ["layer_${i}_pre_ffn_normed"]

        # ── FFN: GeGLU (gate_proj → GELU → * up_proj → down_proj) ──
        # Gemma 4 uses gelu_pytorch_tanh activation in gated configuration
        - name: "layer_${i}_gate_proj"
          op_type: MatMul
          inputs: ["layer_${i}_pre_ffn_normed", "model.layers.${i}.mlp.gate_proj.weight"]
          outputs: ["layer_${i}_gate"]

        - name: "layer_${i}_gate_gelu"
          op_type: GELU
          inputs: ["layer_${i}_gate"]
          outputs: ["layer_${i}_gate_act"]

        - name: "layer_${i}_up_proj"
          op_type: MatMul
          inputs: ["layer_${i}_pre_ffn_normed", "model.layers.${i}.mlp.up_proj.weight"]
          outputs: ["layer_${i}_up"]

        - name: "layer_${i}_geglu_mul"
          op_type: Mul
          inputs: ["layer_${i}_gate_act", "layer_${i}_up"]
          outputs: ["layer_${i}_geglu"]

        - name: "layer_${i}_down_proj"
          op_type: MatMul
          inputs: ["layer_${i}_geglu", "model.layers.${i}.mlp.down_proj.weight"]
          outputs: ["layer_${i}_mlp_out"]

        # ── Post-FFN RMSNorm (Gemma 4 specific) ──
        - name: "layer_${i}_post_ffn_norm"
          op_type: SimplifiedLayerNormalization
          inputs: ["layer_${i}_mlp_out", "model.layers.${i}.post_feedforward_layernorm.weight"]
          outputs: ["layer_${i}_post_ffn_normed"]

        # ── Post-FFN Residual ──
        - name: "layer_${i}_output_add"
          op_type: Add
          inputs: ["layer_${i}_residual", "layer_${i}_post_ffn_normed"]
          outputs: ["layer_${i}_output"]

        # ── Layer Scalar (per-layer multiplicative scaling) ──
        - name: "layer_${i}_layer_scalar"
          op_type: Mul
          inputs: ["layer_${i}_output", "model.layers.${i}.layer_scalar"]
          outputs: ["hidden_0"]

        # ── PerLayerEmbedding (disabled: PLE JIT not yet fully implemented) ──
        # - name: "layer_${i}_ple"
        #   op_type: PerLayerEmbed
        #   only_if: has_per_layer_embedding
        #   inputs:
        #     - "hidden_0"
        #     - "ple_full"
        #     - "model.per_layer_embedding.per_layer_projection.weight"
        #     - "model.layers.${i}.post_mlp_projection.weight"
        #   outputs: ["hidden_0"]
        #   attributes:
        #     layer_idx: "${i}"
        #     dim_per_layer: "${hidden_size_per_layer_input}"
        #     num_layers: "${num_hidden_layers}"
        #     hidden: "${hidden_size}"

    - name: final_norm
      op_type: SimplifiedLayerNormalization
      inputs: ["hidden_0", "model.norm.weight"]
      outputs: [hidden_final]

    - name: lm_head
      op_type: MatMul
      inputs: [hidden_final, model.embed_tokens.weight]
      outputs: [logits]

fusion_hints:
  - pattern: [q_proj, k_proj, v_proj, qk_norm, v_norm, rope]
    target: FusedQkvNormRope
  - pattern: [gate_proj, gate_gelu, up_proj, geglu_mul, down_proj]
    target: GeGLU
  - pattern: [matmul, scale, softmax, matmul]
    target: FlashAttention
