name: qwen3
version: "1.0"
family: decoder
moe_router: qwen
has_head_rms_norm: true
head_rms_norm_eps: 1e-6
# qwen3 / qwen3ForCausalLM 由模板名自动派生
extra_aliases:
  - qwen3moe        # Qwen3-MoE 共用同一模板
  - qwen2_5         # Qwen2.5 架构向前兼容
  - qwen2           # Qwen2 架构向前兼容

config:
  num_layers: "${num_hidden_layers}"
  hidden_size: "${hidden_size}"
  num_heads: "${num_attention_heads}"
  num_kv_heads: "${num_key_value_heads}"
  head_dim: "${head_dim}"
  intermediate_size: "${intermediate_size}"
  vocab_size: "${vocab_size}"
  rope_theta: "${rope_theta}"
  dtype: "${dtype}"

tensor_patterns:
  embedding: "model.embed_tokens.weight"
  lm_head: "lm_head.weight"
  layer_prefix: "model.layers.{}"
  q_proj: "self_attn.q_proj.weight"
  k_proj: "self_attn.k_proj.weight"
  v_proj: "self_attn.v_proj.weight"
  o_proj: "self_attn.o_proj.weight"
  # Qwen3 在 RoPE 之前对 Q/K 做 head-wise RMSNorm with weight。
  # GGUF tensor: blk.{i}.attn_q_norm.weight / attn_k_norm.weight (shape=[head_dim])。
  # HF safetensors: model.layers.{i}.self_attn.q_norm.weight / k_norm.weight。
  # 用 OpKind::HeadRmsNorm 处理(数学 = standard RMSNorm with weight,粒度=head_dim)。
  q_norm: "self_attn.q_norm.weight"
  k_norm: "self_attn.k_norm.weight"
  gate_proj: "mlp.gate_proj.weight"
  up_proj: "mlp.up_proj.weight"
  down_proj: "mlp.down_proj.weight"
  input_layernorm: "input_layernorm.weight"
  post_attention_layernorm: "post_attention_layernorm.weight"
  final_norm: "model.norm.weight"

graph:
  inputs:
    - name: input_ids
      dtype: int64
      shape: [batch, seq_len]

  outputs:
    - name: logits
      dtype: "${dtype}"
      shape: [batch, seq_len, "${vocab_size}"]

  nodes:
    - name: embed
      op_type: Gather
      inputs: [model.embed_tokens.weight, input_ids]
      outputs: [hidden_0]

    - repeat: "${num_hidden_layers}"
      var: i
      nodes:
        - name: "layer_${i}_input_norm"
          op_type: SimplifiedLayerNormalization
          inputs: ["hidden_0", "model.layers.${i}.input_layernorm.weight"]
          outputs: ["layer_${i}_normed"]

        - name: "layer_${i}_q_proj"
          op_type: MatMul
          inputs: ["layer_${i}_normed", "model.layers.${i}.self_attn.q_proj.weight"]
          outputs: ["layer_${i}_q"]

        - name: "layer_${i}_k_proj"
          op_type: MatMul
          inputs: ["layer_${i}_normed", "model.layers.${i}.self_attn.k_proj.weight"]
          outputs: ["layer_${i}_k"]

        - name: "layer_${i}_v_proj"
          op_type: MatMul
          inputs: ["layer_${i}_normed", "model.layers.${i}.self_attn.v_proj.weight"]
          outputs: ["layer_${i}_v"]

        # Qwen3 head-wise RMSNorm with weight (lower 用 lower_norm_grouped):
        #   外层 seq Symbolic, 内层 num_heads Const, 内层 RmsNorm body, weight 每 head 共用。
        - name: "layer_${i}_q_norm"
          op_type: HeadRmsNorm
          inputs: ["layer_${i}_q", "model.layers.${i}.self_attn.q_norm.weight"]
          outputs: ["layer_${i}_q_normed"]
          attributes:
            head_dim: "${head_dim}"
            eps: 1e-6

        - name: "layer_${i}_k_norm"
          op_type: HeadRmsNorm
          inputs: ["layer_${i}_k", "model.layers.${i}.self_attn.k_norm.weight"]
          outputs: ["layer_${i}_k_normed"]
          attributes:
            head_dim: "${head_dim}"
            eps: 1e-6

        # 拆成两个独立单输入 RoPE 节点 (避免 2-output rope 的 per_output_numel 问题)。
        - name: "layer_${i}_rope_q"
          op_type: RotaryEmbedding
          inputs: ["layer_${i}_q_normed"]
          outputs: ["layer_${i}_q_rope"]
          attributes:
            num_heads: "${num_heads}"
            head_dim: "${head_dim}"
            theta: "${rope_theta}"
            partial: 1.0

        - name: "layer_${i}_rope_k"
          op_type: RotaryEmbedding
          inputs: ["layer_${i}_k_normed"]
          outputs: ["layer_${i}_k_rope"]
          attributes:
            num_heads: "${num_kv_heads}"
            head_dim: "${head_dim}"
            theta: "${rope_theta}"
            partial: 1.0

        - name: "layer_${i}_attn"
          op_type: Attention
          inputs: ["layer_${i}_q_rope", "layer_${i}_k_rope", "layer_${i}_v"]
          outputs: ["layer_${i}_attn_out"]

        - name: "layer_${i}_o_proj"
          op_type: MatMul
          inputs: ["layer_${i}_attn_out", "model.layers.${i}.self_attn.o_proj.weight"]
          outputs: ["layer_${i}_attn_proj"]

        - name: "layer_${i}_residual_add"
          op_type: Add
          inputs: ["hidden_0", "layer_${i}_attn_proj"]
          outputs: ["layer_${i}_residual"]

        - name: "layer_${i}_post_norm"
          op_type: SimplifiedLayerNormalization
          inputs: ["layer_${i}_residual", "model.layers.${i}.post_attention_layernorm.weight"]
          outputs: ["layer_${i}_post_normed"]

        - name: "layer_${i}_gate_proj"
          op_type: MatMul
          inputs: ["layer_${i}_post_normed", "model.layers.${i}.mlp.gate_proj.weight"]
          outputs: ["layer_${i}_gate"]

        - name: "layer_${i}_up_proj"
          op_type: MatMul
          inputs: ["layer_${i}_post_normed", "model.layers.${i}.mlp.up_proj.weight"]
          outputs: ["layer_${i}_up"]

        - name: "layer_${i}_silu"
          op_type: SiLU
          inputs: ["layer_${i}_gate"]
          outputs: ["layer_${i}_gate_act"]

        - name: "layer_${i}_swiglu_mul"
          op_type: Mul
          inputs: ["layer_${i}_gate_act", "layer_${i}_up"]
          outputs: ["layer_${i}_swiglu"]

        - name: "layer_${i}_down_proj"
          op_type: MatMul
          inputs: ["layer_${i}_swiglu", "model.layers.${i}.mlp.down_proj.weight"]
          outputs: ["layer_${i}_mlp_out"]

        - name: "layer_${i}_output_add"
          op_type: Add
          inputs: ["layer_${i}_residual", "layer_${i}_mlp_out"]
          outputs: ["hidden_0"]

    - name: final_norm
      op_type: SimplifiedLayerNormalization
      inputs: ["hidden_0", "model.norm.weight"]
      outputs: [hidden_final]

    - name: lm_head
      op_type: MatMul
      inputs: [hidden_final, lm_head.weight]
      outputs: [logits]

fusion_hints:
  - pattern: [q_proj, k_proj, v_proj, rope]
    target: FusedQkvRope
  - pattern: [input_norm, q_proj]
    target: FusedRMSLinear
  - pattern: [gate_proj, silu, up_proj, swiglu_mul]
    target: SwiGLU
  - pattern: [matmul, scale, softmax, matmul]
    target: FlashAttention
