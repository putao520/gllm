name: siglip
version: "1.0"
# T44: SigLIP (Sigmoid Loss for Language-Image Pre-training) ViT encoder.
# Gemma 4 多模态视觉塔 / 通用视觉 encoder。
#
# 架构组成 (HuggingFace `SiglipVisionModel` 源码):
#   - PatchEmbed: Conv2D (kernel = stride = patch_size) 把图像打成 num_patches
#     个 token, 每 token 维度 = embed_dim (= hidden_size)
#   - Learned positional embedding: num_patches × embed_dim 的可学习表
#   - N 层 ViT block: LayerNorm → QKV projection → Bidirectional Attention
#     (causal = 0) → Residual → LayerNorm → FFN (fc1 → GELU → fc2) → Residual
#   - 输出 LayerNorm
#
# 本模板为"基础骨架" (task T44): 只描述拓扑结构, 不接入权重加载 /
# 多模态路由 / 实际推理, 仅用于 YAML 解析 + to_onnx_graph 展开测试。
family: encoder
extra_aliases:
  - siglipvisionmodel       # HuggingFace `architectures` token
  - siglip_vision_model
  - siglipmodel
  - siglipvisiontransformer

config:
  num_layers: "${num_hidden_layers}"
  hidden_size: "${hidden_size}"
  num_heads: "${num_attention_heads}"
  num_kv_heads: "${num_attention_heads}"   # ViT 标准: num_kv_heads == num_heads
  head_dim: "${head_dim}"
  intermediate_size: "${intermediate_size}"
  vocab_size: "${vocab_size}"
  patch_size: "${patch_size}"
  image_size: "${image_size}"
  num_patches: "${num_patches}"
  in_channels: "${in_channels}"
  dtype: "${dtype}"

tensor_patterns:
  # Vision tower 顶层权重
  layer_prefix: "vision_tower.encoder.layers.{}"
  # Attention QKV / output 投影
  q_proj: "self_attn.q_proj.weight"
  k_proj: "self_attn.k_proj.weight"
  v_proj: "self_attn.v_proj.weight"
  o_proj: "self_attn.out_proj.weight"
  # FFN 层 (ViT 用 fc1 / fc2 命名)
  gate_proj: "mlp.fc1.weight"
  down_proj: "mlp.fc2.weight"
  # LayerNorm
  input_layernorm: "layer_norm1.weight"
  post_attention_layernorm: "layer_norm2.weight"
  final_norm: "vision_tower.post_layernorm.weight"

graph:
  inputs:
    - name: pixel_values
      dtype: "${dtype}"
      shape: [batch, "${in_channels}", "${image_size}", "${image_size}"]

  outputs:
    - name: image_tokens
      dtype: "${dtype}"
      shape: [batch, "${num_patches}", "${hidden_size}"]

  nodes:
    # ── PatchEmbed: Conv2D(kernel = stride = patch_size) ──
    # 输入 image [in_channels, image_size, image_size],
    # 权重 kernel [embed_dim, in_channels, patch_size, patch_size],
    # 输出 patches [num_patches, embed_dim]
    - name: patch_embed
      op_type: PatchEmbed
      inputs:
        - pixel_values
        - "vision_tower.patch_embed.proj.weight"
      outputs: [patches]
      attributes:
        patch_size: "${patch_size}"
        embed_dim: "${hidden_size}"
        in_channels: "${in_channels}"
        image_size: "${image_size}"

    # ── LearnedPos2D: patches + pos_table (pure elementwise add) ──
    - name: pos_embed
      op_type: LearnedPos2D
      inputs:
        - patches
        - "vision_tower.embeddings.position_embedding.weight"
      outputs: [hidden_0]
      attributes:
        num_patches: "${num_patches}"
        embed_dim: "${hidden_size}"

    - repeat: "${num_hidden_layers}"
      var: i
      nodes:
        # ── Pre-Attention LayerNorm ──
        - name: "layer_${i}_attn_norm"
          op_type: LayerNormalization
          inputs:
            - "hidden_0"
            - "vision_tower.encoder.layers.${i}.layer_norm1.weight"
            - "vision_tower.encoder.layers.${i}.layer_norm1.bias"
          outputs: ["layer_${i}_normed"]

        # ── Q/K/V Projections ──
        - name: "layer_${i}_q_proj"
          op_type: MatMul
          inputs:
            - "layer_${i}_normed"
            - "vision_tower.encoder.layers.${i}.self_attn.q_proj.weight"
          outputs: ["layer_${i}_q"]

        - name: "layer_${i}_k_proj"
          op_type: MatMul
          inputs:
            - "layer_${i}_normed"
            - "vision_tower.encoder.layers.${i}.self_attn.k_proj.weight"
          outputs: ["layer_${i}_k"]

        - name: "layer_${i}_v_proj"
          op_type: MatMul
          inputs:
            - "layer_${i}_normed"
            - "vision_tower.encoder.layers.${i}.self_attn.v_proj.weight"
          outputs: ["layer_${i}_v"]

        # ── Bidirectional Attention (causal = 0) ──
        # SigLIP 是 vision encoder, 没有因果掩码, 所有 patch token 两两可见。
        - name: "layer_${i}_attn"
          op_type: Attention
          inputs:
            - "layer_${i}_q"
            - "layer_${i}_k"
            - "layer_${i}_v"
          outputs: ["layer_${i}_attn_out"]
          attributes:
            num_heads: "${num_attention_heads}"
            num_kv_heads: "${num_attention_heads}"
            head_dim: "${head_dim}"
            causal: 0

        - name: "layer_${i}_o_proj"
          op_type: MatMul
          inputs:
            - "layer_${i}_attn_out"
            - "vision_tower.encoder.layers.${i}.self_attn.out_proj.weight"
          outputs: ["layer_${i}_attn_proj"]

        # ── Post-Attention Residual ──
        - name: "layer_${i}_attn_residual"
          op_type: Add
          inputs: ["hidden_0", "layer_${i}_attn_proj"]
          outputs: ["layer_${i}_after_attn"]

        # ── Pre-FFN LayerNorm ──
        - name: "layer_${i}_ffn_norm"
          op_type: LayerNormalization
          inputs:
            - "layer_${i}_after_attn"
            - "vision_tower.encoder.layers.${i}.layer_norm2.weight"
            - "vision_tower.encoder.layers.${i}.layer_norm2.bias"
          outputs: ["layer_${i}_ffn_normed"]

        # ── FFN: fc1 → GELU → fc2 ──
        - name: "layer_${i}_fc1"
          op_type: MatMul
          inputs:
            - "layer_${i}_ffn_normed"
            - "vision_tower.encoder.layers.${i}.mlp.fc1.weight"
          outputs: ["layer_${i}_fc1_out"]

        - name: "layer_${i}_gelu"
          op_type: GELU
          inputs: ["layer_${i}_fc1_out"]
          outputs: ["layer_${i}_gelu_out"]

        - name: "layer_${i}_fc2"
          op_type: MatMul
          inputs:
            - "layer_${i}_gelu_out"
            - "vision_tower.encoder.layers.${i}.mlp.fc2.weight"
          outputs: ["layer_${i}_fc2_out"]

        # ── Post-FFN Residual ──
        - name: "layer_${i}_ffn_residual"
          op_type: Add
          inputs: ["layer_${i}_after_attn", "layer_${i}_fc2_out"]
          outputs: ["hidden_0"]

    # ── Final LayerNorm ──
    - name: final_norm
      op_type: LayerNormalization
      inputs:
        - "hidden_0"
        - "vision_tower.post_layernorm.weight"
        - "vision_tower.post_layernorm.bias"
      outputs: [image_tokens]

fusion_hints:
  - pattern: [q_proj, k_proj, v_proj]
    target: FusedQkv
  - pattern: [fc1, gelu, fc2]
    target: FusedLinearGELU
  - pattern: [matmul, softmax, matmul]
    target: FlashAttention
