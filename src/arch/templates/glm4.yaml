name: glm4
version: "1.0"

config:
  num_layers: "${num_hidden_layers}"
  hidden_size: "${hidden_size}"
  num_heads: "${num_attention_heads}"
  num_kv_heads: "${num_key_value_heads}"
  head_dim: "${head_dim}"
  intermediate_size: "${intermediate_size}"
  vocab_size: "${vocab_size}"
  rope_theta: "${rope_theta}"
  dtype: "${dtype}"

tensor_patterns:
  embedding: "transformer.embedding.word_embeddings.weight"
  lm_head: "transformer.output_layer.weight"
  layer_prefix: "transformer.encoder.layers.{}"
  q_proj: "self_attention.query_key_value.weight"
  o_proj: "self_attention.dense.weight"
  gate_proj: "mlp.gate_proj.weight"
  up_proj: "mlp.up_proj.weight"
  down_proj: "mlp.down_proj.weight"
  input_layernorm: "input_layernorm.weight"
  post_attention_layernorm: "post_attention_layernorm.weight"
  final_norm: "transformer.encoder.final_layernorm.weight"

graph:
  inputs:
    - name: input_ids
      dtype: int64
      shape: [batch, seq_len]

  outputs:
    - name: logits
      dtype: "${dtype}"
      shape: [batch, seq_len, "${vocab_size}"]

  nodes:
    - name: embed
      op_type: Gather
      inputs: [transformer.embedding.word_embeddings.weight, input_ids]
      outputs: [hidden_0]

    - repeat: "${num_hidden_layers}"
      var: i
      nodes:
        - name: "layer_${i}_input_norm"
          op_type: SimplifiedLayerNormalization
          inputs: ["hidden_${i}", "transformer.encoder.layers.${i}.input_layernorm.weight"]
          outputs: ["layer_${i}_normed"]

        - name: "layer_${i}_qkv_proj"
          op_type: MatMul
          inputs: ["layer_${i}_normed", "transformer.encoder.layers.${i}.self_attention.query_key_value.weight"]
          outputs: ["layer_${i}_qkv"]

        - name: "layer_${i}_qkv_split"
          op_type: Split
          inputs: ["layer_${i}_qkv"]
          outputs: ["layer_${i}_q", "layer_${i}_k", "layer_${i}_v"]

        - name: "layer_${i}_rope"
          op_type: RotaryEmbedding
          inputs: ["layer_${i}_q", "layer_${i}_k"]
          outputs: ["layer_${i}_q_rope", "layer_${i}_k_rope"]
          attributes:
            theta: "${rope_theta}"

        - name: "layer_${i}_attn"
          op_type: Attention
          inputs: ["layer_${i}_q_rope", "layer_${i}_k_rope", "layer_${i}_v"]
          outputs: ["layer_${i}_attn_out"]

        - name: "layer_${i}_o_proj"
          op_type: MatMul
          inputs: ["layer_${i}_attn_out", "transformer.encoder.layers.${i}.self_attention.dense.weight"]
          outputs: ["layer_${i}_attn_proj"]

        - name: "layer_${i}_residual_add"
          op_type: Add
          inputs: ["hidden_${i}", "layer_${i}_attn_proj"]
          outputs: ["layer_${i}_residual"]

        - name: "layer_${i}_post_norm"
          op_type: SimplifiedLayerNormalization
          inputs: ["layer_${i}_residual", "transformer.encoder.layers.${i}.post_attention_layernorm.weight"]
          outputs: ["layer_${i}_post_normed"]

        - name: "layer_${i}_gate_proj"
          op_type: MatMul
          inputs: ["layer_${i}_post_normed", "transformer.encoder.layers.${i}.mlp.gate_proj.weight"]
          outputs: ["layer_${i}_gate"]

        - name: "layer_${i}_up_proj"
          op_type: MatMul
          inputs: ["layer_${i}_post_normed", "transformer.encoder.layers.${i}.mlp.up_proj.weight"]
          outputs: ["layer_${i}_up"]

        - name: "layer_${i}_silu"
          op_type: SiLU
          inputs: ["layer_${i}_gate"]
          outputs: ["layer_${i}_gate_act"]

        - name: "layer_${i}_swiglu_mul"
          op_type: Mul
          inputs: ["layer_${i}_gate_act", "layer_${i}_up"]
          outputs: ["layer_${i}_swiglu"]

        - name: "layer_${i}_down_proj"
          op_type: MatMul
          inputs: ["layer_${i}_swiglu", "transformer.encoder.layers.${i}.mlp.down_proj.weight"]
          outputs: ["layer_${i}_mlp_out"]

        - name: "layer_${i}_output_add"
          op_type: Add
          inputs: ["layer_${i}_residual", "layer_${i}_mlp_out"]
          outputs: ["hidden_${i}"]

    - name: final_norm
      op_type: SimplifiedLayerNormalization
      inputs: ["hidden_0", "transformer.encoder.final_layernorm.weight"]
      outputs: [hidden_final]

    - name: lm_head
      op_type: MatMul
      inputs: [hidden_final, transformer.output_layer.weight]
      outputs: [logits]

fusion_hints:
  - pattern: [qkv_proj, qkv_split, rope]
    target: FusedQkvRope
  - pattern: [input_norm, qkv_proj]
    target: FusedRMSLinear
  - pattern: [gate_proj, silu, up_proj, swiglu_mul]
    target: SwiGLU
  - pattern: [matmul, scale, softmax, matmul]
    target: FlashAttention
