name: xlmr-reranker
version: "1.0"
family: encoder
# ARCH-TEMPLATE-KIND-OVERRIDE: 此模板仅通过 KIND_TEMPLATE_OVERRIDE 被选择
# (ModelKind::Reranker + xlmr/roberta/bert 架构 → xlmr-reranker)。不暴露
# 独立别名，避免 Embedding/Chat 场景错 resolve 到这里。
extra_aliases: []

config:
  num_layers: "${num_hidden_layers}"
  hidden_size: "${hidden_size}"
  num_heads: "${num_attention_heads}"
  num_kv_heads: "${num_attention_heads}"
  head_dim: "${head_dim}"
  intermediate_size: "${intermediate_size}"
  vocab_size: "${vocab_size}"
  dtype: "${dtype}"

tensor_patterns:
  embedding: "roberta.embeddings.word_embeddings.weight"
  layer_prefix: "roberta.encoder.layer.{}"
  q_proj: "attention.self.query.weight"
  k_proj: "attention.self.key.weight"
  v_proj: "attention.self.value.weight"
  o_proj: "attention.output.dense.weight"
  gate_proj: "intermediate.dense.weight"
  down_proj: "output.dense.weight"
  input_layernorm: "attention.output.LayerNorm.weight"
  post_attention_layernorm: "output.LayerNorm.weight"

graph:
  inputs:
    - name: input_ids
      dtype: int64
      shape: [batch, seq_len]

  derived_inputs:
    - name: position_ids
      generator: arange
    - name: token_type_ids
      generator: zeros

  outputs:
    - name: rerank_logit
      dtype: "${dtype}"
      shape: [batch, seq_len, 1]

  nodes:
    - name: embed_tokens
      op_type: Gather
      inputs: [input_ids, roberta.embeddings.word_embeddings.weight]
      outputs: [embed_tok]

    - name: embed_pos
      op_type: Gather
      inputs: [position_ids, roberta.embeddings.position_embeddings.weight]
      outputs: [embed_pos_out]

    - name: embed_type
      op_type: Gather
      inputs: [token_type_ids, roberta.embeddings.token_type_embeddings.weight]
      outputs: [embed_type_out]

    - name: embed_add_pos
      op_type: Add
      inputs: [embed_tok, embed_pos_out]
      outputs: [embed_sum_1]

    - name: embed_add_type
      op_type: Add
      inputs: [embed_sum_1, embed_type_out]
      outputs: [embed_sum]

    - name: embed_norm
      op_type: LayerNormalization
      inputs: [embed_sum, roberta.embeddings.LayerNorm.weight, roberta.embeddings.LayerNorm.bias]
      outputs: [hidden_0]

    - repeat: "${num_hidden_layers}"
      var: i
      nodes:
        - name: "layer_${i}_q_proj"
          op_type: MatMul
          inputs: ["hidden_0", "roberta.encoder.layer.${i}.attention.self.query.weight"]
          outputs: ["layer_${i}_q"]

        - name: "layer_${i}_q_bias"
          op_type: Add
          inputs: ["layer_${i}_q", "roberta.encoder.layer.${i}.attention.self.query.bias"]
          outputs: ["layer_${i}_q_biased"]

        - name: "layer_${i}_k_proj"
          op_type: MatMul
          inputs: ["hidden_0", "roberta.encoder.layer.${i}.attention.self.key.weight"]
          outputs: ["layer_${i}_k"]

        - name: "layer_${i}_k_bias"
          op_type: Add
          inputs: ["layer_${i}_k", "roberta.encoder.layer.${i}.attention.self.key.bias"]
          outputs: ["layer_${i}_k_biased"]

        - name: "layer_${i}_v_proj"
          op_type: MatMul
          inputs: ["hidden_0", "roberta.encoder.layer.${i}.attention.self.value.weight"]
          outputs: ["layer_${i}_v"]

        - name: "layer_${i}_v_bias"
          op_type: Add
          inputs: ["layer_${i}_v", "roberta.encoder.layer.${i}.attention.self.value.bias"]
          outputs: ["layer_${i}_v_biased"]

        - name: "layer_${i}_attn"
          op_type: Attention
          inputs: ["layer_${i}_q_biased", "layer_${i}_k_biased", "layer_${i}_v_biased"]
          outputs: ["layer_${i}_attn_out"]
          attributes:
            bidirectional: 1

        - name: "layer_${i}_o_proj"
          op_type: MatMul
          inputs: ["layer_${i}_attn_out", "roberta.encoder.layer.${i}.attention.output.dense.weight"]
          outputs: ["layer_${i}_attn_proj"]

        - name: "layer_${i}_o_bias"
          op_type: Add
          inputs: ["layer_${i}_attn_proj", "roberta.encoder.layer.${i}.attention.output.dense.bias"]
          outputs: ["layer_${i}_attn_biased"]

        - name: "layer_${i}_residual_add"
          op_type: Add
          inputs: ["hidden_0", "layer_${i}_attn_biased"]
          outputs: ["layer_${i}_attn_residual"]

        - name: "layer_${i}_attn_norm"
          op_type: LayerNormalization
          inputs: ["layer_${i}_attn_residual", "roberta.encoder.layer.${i}.attention.output.LayerNorm.weight", "roberta.encoder.layer.${i}.attention.output.LayerNorm.bias"]
          outputs: ["layer_${i}_attn_normed"]

        - name: "layer_${i}_intermediate"
          op_type: MatMul
          inputs: ["layer_${i}_attn_normed", "roberta.encoder.layer.${i}.intermediate.dense.weight"]
          outputs: ["layer_${i}_inter"]

        - name: "layer_${i}_intermediate_bias"
          op_type: Add
          inputs: ["layer_${i}_inter", "roberta.encoder.layer.${i}.intermediate.dense.bias"]
          outputs: ["layer_${i}_inter_biased"]

        - name: "layer_${i}_gelu"
          op_type: GELU
          inputs: ["layer_${i}_inter_biased"]
          outputs: ["layer_${i}_act"]

        - name: "layer_${i}_output"
          op_type: MatMul
          inputs: ["layer_${i}_act", "roberta.encoder.layer.${i}.output.dense.weight"]
          outputs: ["layer_${i}_out_proj"]

        - name: "layer_${i}_output_bias"
          op_type: Add
          inputs: ["layer_${i}_out_proj", "roberta.encoder.layer.${i}.output.dense.bias"]
          outputs: ["layer_${i}_out_biased"]

        - name: "layer_${i}_ffn_residual"
          op_type: Add
          inputs: ["layer_${i}_attn_normed", "layer_${i}_out_biased"]
          outputs: ["layer_${i}_ffn_residual_out"]

        - name: "layer_${i}_output_norm"
          op_type: LayerNormalization
          inputs: ["layer_${i}_ffn_residual_out", "roberta.encoder.layer.${i}.output.LayerNorm.weight", "roberta.encoder.layer.${i}.output.LayerNorm.bias"]
          outputs: ["hidden_0"]

    # ── Reranker classifier head (RobertaClassificationHead) ──
    # 结构: dense(hidden→hidden) + tanh + out_proj(hidden→1)
    # 输入: encoder 最后一层输出 hidden_0 [batch, seq, hidden]
    # 注: Linear 对每个 token 独立作用; CLS token (position 0) 的 logit
    #     由后端提取即可。代价 = 整层线性变换, 小规模 reranker 可接受。
    - name: "classifier_dense_matmul"
      op_type: MatMul
      inputs: ["hidden_0", "classifier.dense.weight"]
      outputs: ["classifier_dense_raw"]

    - name: "classifier_dense_bias"
      op_type: Add
      inputs: ["classifier_dense_raw", "classifier.dense.bias"]
      outputs: ["classifier_dense_biased"]

    - name: "classifier_tanh"
      op_type: Tanh
      inputs: ["classifier_dense_biased"]
      outputs: ["classifier_tanh_out"]

    - name: "classifier_out_proj_matmul"
      op_type: MatMul
      inputs: ["classifier_tanh_out", "classifier.out_proj.weight"]
      outputs: ["classifier_out_raw"]

    - name: "classifier_out_bias"
      op_type: Add
      inputs: ["classifier_out_raw", "classifier.out_proj.bias"]
      outputs: ["rerank_logit"]

fusion_hints:
  - pattern: [q_proj, q_bias, k_proj, k_bias, v_proj, v_bias]
    target: FusedQkvBias
  - pattern: [intermediate, intermediate_bias, gelu]
    target: FusedLinearGELU
  - pattern: [matmul, scale, softmax, matmul]
    target: FlashAttention
