name: gptoss
version: "1.0"
family: decoder
moe_router: gptoss
# gptoss / gptOssForCausalLM 由模板名自动派生
extra_aliases:
  - gpt_oss          # HF model_type
  - GptOss           # HF architecture name (PascalCase variant)

# ============================================================================
# OpenAI gpt-oss-20b architecture (HF: openai/gpt-oss-20b)
# ============================================================================
#
# 关键差异 (与 llama/qwen3 不同):
#   - 24 层 sliding/full attention 交替 (sliding_window=128, layer_types[])
#   - yarn RoPE: theta=150000, factor=32, beta_fast=32, beta_slow=1
#   - attention_bias=true (Q/K/V/O 投影含 bias)
#   - MoE: 32 local experts, 4 experts/token (packed expert layout)
#   - Attention sinks: model.layers.{i}.self_attn.sinks[num_heads]
#   - swiglu_limit=7.0 (SwiGLU 钳位)
#   - mxfp4 量化 (仅 MoE expert 权重,attention/router/embed/lm_head 保留 BF16)
#   - tie_word_embeddings=false
#
# 关联 SPEC: SPEC/SUPPORTED_MODELS.md (GPT-OSS Series), task #19
# ============================================================================

config:
  num_layers: "${num_hidden_layers}"
  hidden_size: "${hidden_size}"
  num_heads: "${num_attention_heads}"
  num_kv_heads: "${num_key_value_heads}"
  head_dim: "${head_dim}"
  intermediate_size: "${intermediate_size}"
  vocab_size: "${vocab_size}"
  rope_theta: "${rope_theta}"
  rope_scaling_type: "yarn"
  rope_scaling_factor: 32.0
  rope_scaling_beta_fast: 32.0
  rope_scaling_beta_slow: 1.0
  rope_scaling_original_max_position: 4096
  sliding_window: 128
  num_local_experts: 32
  num_experts_per_tok: 4
  swiglu_limit: 7.0
  attention_bias: 1   # 1=true (ConfigValue 无 Bool 变体,用 Int 表示)
  dtype: "${dtype}"

tensor_patterns:
  embedding: "model.embed_tokens.weight"
  lm_head: "lm_head.weight"
  layer_prefix: "model.layers.{}"

  # Attention 投影 (含 bias)
  q_proj: "self_attn.q_proj.weight"
  q_proj_bias: "self_attn.q_proj.bias"
  k_proj: "self_attn.k_proj.weight"
  k_proj_bias: "self_attn.k_proj.bias"
  v_proj: "self_attn.v_proj.weight"
  v_proj_bias: "self_attn.v_proj.bias"
  o_proj: "self_attn.o_proj.weight"
  o_proj_bias: "self_attn.o_proj.bias"

  # Attention sinks (gpt-oss 独有: softmax 分母拼接的 learnable sink tokens)
  attn_sinks: "self_attn.sinks"

  # MoE Router (BF16, 不量化)
  router: "mlp.router.weight"
  router_bias: "mlp.router.bias"

  # MoE Experts (mxfp4 量化, packed across all 32 experts)
  # Layout: gate_up_proj_blocks shape = [num_experts, intermediate*2 / 32, hidden]
  #         gate_up_proj_scales shape = [num_experts, intermediate*2 / 32]
  experts_gate_up_blocks: "mlp.experts.gate_up_proj_blocks"
  experts_gate_up_scales: "mlp.experts.gate_up_proj_scales"
  experts_gate_up_bias: "mlp.experts.gate_up_proj_bias"
  experts_down_blocks: "mlp.experts.down_proj_blocks"
  experts_down_scales: "mlp.experts.down_proj_scales"
  experts_down_bias: "mlp.experts.down_proj_bias"

  # Norm
  input_layernorm: "input_layernorm.weight"
  post_attention_layernorm: "post_attention_layernorm.weight"
  final_norm: "model.norm.weight"

graph:
  inputs:
    - name: input_ids
      dtype: int64
      shape: [batch, seq_len]

  outputs:
    - name: logits
      dtype: "${dtype}"
      shape: [batch, seq_len, "${vocab_size}"]

  nodes:
    - name: embed
      op_type: Gather
      inputs: [model.embed_tokens.weight, input_ids]
      outputs: [hidden_0]

    - repeat: "${num_hidden_layers}"
      var: i
      nodes:
        - name: "layer_${i}_input_norm"
          op_type: SimplifiedLayerNormalization
          inputs: ["hidden_0", "model.layers.${i}.input_layernorm.weight"]
          outputs: ["layer_${i}_normed"]

        # Q/K/V projections + bias (attention_bias=true)
        - name: "layer_${i}_q_proj"
          op_type: MatMul
          inputs: ["layer_${i}_normed", "model.layers.${i}.self_attn.q_proj.weight"]
          outputs: ["layer_${i}_q_raw"]

        - name: "layer_${i}_q_bias"
          op_type: Add
          inputs: ["layer_${i}_q_raw", "model.layers.${i}.self_attn.q_proj.bias"]
          outputs: ["layer_${i}_q"]

        - name: "layer_${i}_k_proj"
          op_type: MatMul
          inputs: ["layer_${i}_normed", "model.layers.${i}.self_attn.k_proj.weight"]
          outputs: ["layer_${i}_k_raw"]

        - name: "layer_${i}_k_bias"
          op_type: Add
          inputs: ["layer_${i}_k_raw", "model.layers.${i}.self_attn.k_proj.bias"]
          outputs: ["layer_${i}_k"]

        - name: "layer_${i}_v_proj"
          op_type: MatMul
          inputs: ["layer_${i}_normed", "model.layers.${i}.self_attn.v_proj.weight"]
          outputs: ["layer_${i}_v_raw"]

        - name: "layer_${i}_v_bias"
          op_type: Add
          inputs: ["layer_${i}_v_raw", "model.layers.${i}.self_attn.v_proj.bias"]
          outputs: ["layer_${i}_v"]

        # YARN RoPE (rope_type=yarn, factor=32, original_max_position=4096)
        - name: "layer_${i}_rope_q"
          op_type: RotaryEmbedding
          inputs: ["layer_${i}_q"]
          outputs: ["layer_${i}_q_rope"]
          attributes:
            num_heads: "${num_heads}"
            head_dim: "${head_dim}"
            theta: "${rope_theta}"
            partial: 1.0
            scaling_type: "yarn"
            scaling_factor: 32.0
            beta_fast: 32.0
            beta_slow: 1.0
            original_max_position: 4096

        - name: "layer_${i}_rope_k"
          op_type: RotaryEmbedding
          inputs: ["layer_${i}_k"]
          outputs: ["layer_${i}_k_rope"]
          attributes:
            num_heads: "${num_kv_heads}"
            head_dim: "${head_dim}"
            theta: "${rope_theta}"
            partial: 1.0
            scaling_type: "yarn"
            scaling_factor: 32.0
            beta_fast: 32.0
            beta_slow: 1.0
            original_max_position: 4096

        # Attention with sinks + sliding/full layer-type alternation
        # layer_types[] 由 model_config 解析后通过 attribute 注入
        - name: "layer_${i}_attn"
          op_type: Attention
          inputs: ["layer_${i}_q_rope", "layer_${i}_k_rope", "layer_${i}_v", "model.layers.${i}.self_attn.sinks"]
          outputs: ["layer_${i}_attn_out"]
          attributes:
            sliding_window: 128
            attention_sinks: 1
            layer_index: "${i}"

        # O projection + bias
        - name: "layer_${i}_o_proj"
          op_type: MatMul
          inputs: ["layer_${i}_attn_out", "model.layers.${i}.self_attn.o_proj.weight"]
          outputs: ["layer_${i}_attn_proj_raw"]

        - name: "layer_${i}_o_bias"
          op_type: Add
          inputs: ["layer_${i}_attn_proj_raw", "model.layers.${i}.self_attn.o_proj.bias"]
          outputs: ["layer_${i}_attn_proj"]

        - name: "layer_${i}_residual_add"
          op_type: Add
          inputs: ["hidden_0", "layer_${i}_attn_proj"]
          outputs: ["layer_${i}_residual"]

        - name: "layer_${i}_post_norm"
          op_type: SimplifiedLayerNormalization
          inputs: ["layer_${i}_residual", "model.layers.${i}.post_attention_layernorm.weight"]
          outputs: ["layer_${i}_post_normed"]

        # MoE Router (32 local experts, top-4)
        - name: "layer_${i}_router"
          op_type: MoERouter
          inputs: ["layer_${i}_post_normed", "model.layers.${i}.mlp.router.weight", "model.layers.${i}.mlp.router.bias"]
          outputs: ["layer_${i}_router_weights", "layer_${i}_router_indices"]
          attributes:
            num_experts: 32
            top_k: 4

        # Packed-expert MoE dispatch (mxfp4 quantized, gate_up packed)
        # 与 deepseek per-expert dispatch 不同: 单 packed tensor 含全部 32 experts
        - name: "layer_${i}_moe_dispatch"
          op_type: MoEDispatchPacked
          inputs:
            - "layer_${i}_post_normed"
            - "layer_${i}_router_weights"
            - "layer_${i}_router_indices"
            - "model.layers.${i}.mlp.experts.gate_up_proj_blocks"
            - "model.layers.${i}.mlp.experts.gate_up_proj_scales"
            - "model.layers.${i}.mlp.experts.gate_up_proj_bias"
            - "model.layers.${i}.mlp.experts.down_proj_blocks"
            - "model.layers.${i}.mlp.experts.down_proj_scales"
            - "model.layers.${i}.mlp.experts.down_proj_bias"
          outputs: ["layer_${i}_mlp_out"]
          attributes:
            num_experts: 32
            top_k: 4
            quant_method: "mxfp4"
            mxfp4_block_size: 32
            activation: "swiglu"
            swiglu_limit: 7.0

        - name: "layer_${i}_output_add"
          op_type: Add
          inputs: ["layer_${i}_residual", "layer_${i}_mlp_out"]
          outputs: ["hidden_0"]

    - name: final_norm
      op_type: SimplifiedLayerNormalization
      inputs: ["hidden_0", "model.norm.weight"]
      outputs: [hidden_final]

    - name: lm_head
      op_type: MatMul
      inputs: [hidden_final, lm_head.weight]
      outputs: [logits]

fusion_hints:
  - pattern: [q_proj, q_bias, rope_q]
    target: FusedQkvBiasRope
  - pattern: [k_proj, k_bias, rope_k]
    target: FusedQkvBiasRope
  - pattern: [v_proj, v_bias]
    target: FusedLinearBias
  - pattern: [input_norm, q_proj]
    target: FusedRMSLinear
  - pattern: [matmul, scale, softmax_with_sinks, matmul]
    target: FlashAttentionWithSinks
